<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Titolo della pagina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400;600;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/reset.css" />
    <link rel="stylesheet" href="./assets/style.css" />
    <style>
      /* Forza i loghi locali a diventare stilizzati in bianco e nero nel browser */
      .logo img {
        filter: grayscale(100%) contrast(200%);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="logo">
          <img src="./assets/img/logo.png" alt="Logo Instagram" />
        </div>
        <nav class="main-menu">
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/chi-siamo">Chi siamo</a></li>
            <li><a href="/contatti">Contatti</a></li>
          </ul>
        </nav>
      </header>
      <main class="main">
        <section class="box-list"></section>
      </main>
      <footer class="footer">
        <div class="logo">
          <img src="./assets/img/logo.png" alt="Logo Instagram" />
        </div>
        <div class="credits">
          <p>2023 - Tutti i diritti riservati</p>
        </div>
      </footer>
    </div>

    <script type="text/javascript">
      /* ======================================================================
      ESERCIZIO 3 - Manipolazione del DOM
      CONSEGNA: Crea una pagina HTML con un bottone e un paragrafo. 
      Quando l'utente clicca il bottone, il testo del paragrafo deve cambiare 
      e il colore deve diventare blu.
      ======================================================================
      */

      document.addEventListener("DOMContentLoaded", () => {
        // Intercetto il contenitore main per inserire i nuovi elementi alla fine
        const mainContainer = document.querySelector(".main");

        if (mainContainer) {
          // Creo dinamicamente il bottone richiesto dall'esercizio
          const bottone = document.createElement("button");
          bottone.id = "myButton";
          bottone.textContent = "Cliccami!";
          bottone.style.margin = "20px auto";
          bottone.style.display = "block";
          bottone.style.padding = "10px 20px";

          // Creo dinamicamente il paragrafo richiesto dall'esercizio
          const paragrafo = document.createElement("p");
          paragrafo.id = "myParagraph";
          paragrafo.textContent = "Questo è il testo originale del paragrafo.";
          paragrafo.style.textAlign = "center";
          paragrafo.style.fontSize = "18px";

          // Appendo il bottone e il paragrafo dentro la sezione main
          mainContainer.appendChild(bottone);
          mainContainer.appendChild(paragrafo);

          // Gestisco l'evento click sul bottone per cambiare testo e colore
          bottone.addEventListener("click", () => {
            paragrafo.textContent = "Il testo è stato modificato con successo!"; // Cambia il testo
            paragrafo.style.color = "blue"; // Cambia il colore in blu
          });
        }
      });
    </script>
  </body>
</html>
